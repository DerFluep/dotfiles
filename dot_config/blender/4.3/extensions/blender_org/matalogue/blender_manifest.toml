schema_version = "1.0.0"

id = "matalogue"
version = "1.4.0"
name = "Matalogue"
tagline = "All your node trees in one list!"
description = "A Blender add-on that displays a list of materials and other node trees right in the toolbar of the Node Editor. It's like the Outliner, but for node trees!"

type = "add-on"
permissions = []

# Optional link to documentation, support, source files, etc
website = "https://github.com/gregzaal/Matalogue"

# List defined by Blender and server, see:
# https://docs.blender.org/manual/en/4.1/extensions/tags.html
tags = ["Node Editor"]

blender_version_min = "4.2.0"
# blender_version_max = "5.1.0"

maintainer = "Greg Zaal <gregzaal@gmail.com>"
license = ["SPDX:GPL-2.0-or-later"]
copyright = ["2015-2024 Greg Zaal"]
